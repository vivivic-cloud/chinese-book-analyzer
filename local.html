<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>중국어.분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a1a1a;color:#c8c8c8;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 40px}

header{padding:28px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:14px;color:#c8c8c8;letter-spacing:.01em}
.logo b{font-weight:600;color:#fff}
.badge{font-size:10px;color:#2a3a2a;letter-spacing:.1em;text-transform:uppercase;border:1px solid #1e2e1e;padding:3px 8px}
hr.rule{border:none;border-top:1px solid #2e2e2e}
.meta{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#3a3a3a;text-align:right;padding:12px 0 24px}

.drop-zone{border:1px dashed #252525;padding:56px 40px;text-align:center;cursor:pointer;transition:border-color .15s}
.drop-zone:hover,.drop-zone.over{border-color:#3a3a3a}
.drop-hint{font-size:12px;color:#2e2e2e;letter-spacing:.06em;line-height:2}
input[type=file]{display:none}

.preview{display:none;gap:32px;margin:28px 0;align-items:flex-start}
.preview.show{display:flex}
.preview img{width:180px;height:240px;object-fit:cover;border:1px solid #242424;flex-shrink:0}
.preview-info{flex:1;padding-top:4px;display:flex;flex-direction:column;gap:14px}
.file-name{font-size:11px;color:#333;letter-spacing:.06em}

.btn{background:transparent;border:1px solid #2e2e2e;color:#666;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:10px 24px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){border-color:#555;color:#bbb}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-go{border-color:#3a3a3a;color:#888}
.btn-go:hover:not(:disabled){border-color:#777;color:#e0e0e0}

.status{font-size:11px;color:#3a3a3a;letter-spacing:.06em}
.progress{height:1px;background:#222;overflow:hidden;display:none}
.progress.show{display:block}
.progress-fill{height:100%;background:#444;width:0%;transition:width .4s}
.error-msg{font-size:12px;color:#7a3535;letter-spacing:.04em;padding:12px;border:1px solid #3d1f1f;display:none}
.error-msg.show{display:block}

#results{display:none;margin-top:8px}
#results.show{display:block}
.ocr-toggle{font-size:10px;letter-spacing:.12em;color:#2e2e2e;cursor:pointer;text-transform:uppercase;padding:16px 0;display:inline-block}
.ocr-toggle:hover{color:#555}
.ocr-box{background:#171717;border:1px solid #222;padding:16px;font-size:12px;color:#3a3a3a;line-height:1.8;white-space:pre-wrap;word-break:break-all;display:none;margin-bottom:8px}
.ocr-box.show{display:block}
.lang-badge{font-size:10px;letter-spacing:.12em;color:#2e2e2e;text-transform:uppercase;padding:14px 0 4px;display:block}

.sentence{display:flex;gap:20px;padding:28px 0;border-bottom:1px solid #1e1e1e}
.sentence:last-child{border-bottom:none}
.s-num{font-size:10px;letter-spacing:.14em;color:#252525;min-width:22px;padding-top:6px;text-align:right;flex-shrink:0}
.s-body{flex:1;min-width:0}
.s-text{font-size:18px;line-height:2.4;color:#d0d0d0;margin-bottom:10px;word-break:break-all}
.s-trans{font-size:12px;color:#383838;line-height:1.7}
.token{cursor:pointer;border-bottom:1px solid transparent;transition:color .1s,border-color .1s;padding:0 1px}
.token:hover{color:#fff;border-bottom-color:#555}
.token.active{color:#fff;border-bottom-color:#888}

#popup{position:fixed;background:#1c1c1c;border:1px solid #282828;padding:20px 22px;min-width:252px;max-width:320px;z-index:9999;display:none;box-shadow:0 16px 48px rgba(0,0,0,.85)}
.pop-close{position:absolute;top:10px;right:13px;cursor:pointer;color:#2e2e2e;font-size:12px;line-height:1}
.pop-close:hover{color:#555}
.pop-word{font-size:26px;font-weight:300;color:#fff;margin-bottom:3px;letter-spacing:.04em}
.pop-read{font-size:12px;color:#484848;letter-spacing:.1em;margin-bottom:14px;font-style:italic}
.pop-mean{font-size:14px;color:#a8a8a8;line-height:1.7;margin-bottom:10px}
.pop-gram{font-size:10px;color:#303030;letter-spacing:.12em;text-transform:uppercase}

footer{padding:16px 0;margin-top:60px;display:flex;justify-content:space-between;font-size:10px;color:#222;letter-spacing:.06em;border-top:1px solid #1e1e1e}
</style>
</head>
<body>

<div id="popup">
  <span class="pop-close" onclick="closePopup()">✕</span>
  <div class="pop-word" id="pw"></div>
  <div class="pop-read" id="pr"></div>
  <div class="pop-mean" id="pm"></div>
  <div class="pop-gram" id="pg"></div>
</div>

<div class="wrap">
  <header>
    <div class="logo">중국어<b>.분석기</b></div>
    <span class="badge">Claude Max</span>
  </header>
  <hr class="rule">
  <div class="meta">페이지 분석 ▶</div>

  <div class="drop-zone" id="drop" onclick="document.getElementById('fi').click()">
    <div class="drop-hint">
      이미지를 드래그하거나 클릭해서 올려주세요<br>
      <span style="font-size:10px;color:#222;letter-spacing:.08em">HEIC · JPG · PNG · WEBP</span>
    </div>
  </div>
  <input type="file" id="fi" accept=".heic,.heif,.jpg,.jpeg,.png,.webp,image/*">

  <div class="preview" id="preview">
    <img id="prev-img" src="" alt="">
    <div class="preview-info">
      <div class="file-name" id="prev-name"></div>
      <button class="btn btn-go" id="go-btn" onclick="runAnalysis()">분 석</button>
      <div class="status" id="status"></div>
      <div class="progress" id="prog"><div class="progress-fill" id="pfill"></div></div>
      <div class="error-msg" id="err"></div>
    </div>
  </div>

  <div id="results">
    <hr class="rule">
    <span class="lang-badge" id="lang-badge"></span>
    <span class="ocr-toggle" id="ocr-toggle" onclick="toggleOcr()">OCR 원문 ▸</span>
    <div class="ocr-box" id="ocr-box"></div>
    <div id="sent-list"></div>
  </div>

  <footer>
    <span>중국어.분석기</span>
    <span>powered by Claude Max</span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
let imgB64 = null;

// ── Upload ────────────────────────────────────────────
const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

async function processFile(file) {
  setStatus('처리 중...'); prog(20); clearErr(); clearResults();
  try {
    let blob = file;
    if (/\.heic$|\.heif$/i.test(file.name)) {
      setStatus('HEIC 변환 중...');
      blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.7 });
      if (Array.isArray(blob)) blob = blob[0];
    }
    prog(60);
    imgB64 = await compress(blob);
    document.getElementById('prev-img').src = 'data:image/jpeg;base64,' + imgB64;
    document.getElementById('prev-name').textContent = file.name;
    document.getElementById('preview').classList.add('show');
    prog(0); setStatus('');
  } catch(e) { showErr('파일 처리 실패: ' + e.message); prog(0); }
}

function compress(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const MAX = 1400;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = c.toDataURL('image/jpeg', 0.75).split(',')[1];
      URL.revokeObjectURL(url);
      res(b64);
    };
    img.onerror = rej;
    img.src = url;
  });
}

// ── Analyze ───────────────────────────────────────────
async function runAnalysis() {
  if (!imgB64) { showErr('이미지를 먼저 올려주세요.'); return; }
  clearErr(); clearResults();
  document.getElementById('go-btn').disabled = true;
  setStatus('분석 중... (1~2분 소요)');
  prog(15);

  // Fake progress animation
  let p = 15;
  const tick = setInterval(() => { p = Math.min(p + 3, 85); prog(p); }, 3000);

  try {
    const r = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imgB64 })
    });
    clearInterval(tick);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `서버 오류 ${r.status}`);
    prog(100); setTimeout(() => prog(0), 600);
    setStatus('');
    render(data);
  } catch(e) {
    clearInterval(tick);
    showErr(e.message); prog(0); setStatus('');
  }
  document.getElementById('go-btn').disabled = false;
}

// ── Render ────────────────────────────────────────────
const LANG_NAME = { zh:'🇨🇳 중국어', ja:'🇯🇵 일본어', ko:'🇰🇷 한국어', en:'🇺🇸 영어' };

function render(data) {
  const lang = data.language || 'zh';
  const space = ['ko','en'].includes(lang);
  document.getElementById('lang-badge').textContent = (LANG_NAME[lang] || lang) + ' · Claude Max';
  if (data.ocr) {
    document.getElementById('ocr-box').textContent = data.ocr;
    document.getElementById('ocr-toggle').style.display = 'inline-block';
  }
  const list = document.getElementById('sent-list');
  list.innerHTML = '';
  (data.sentences || []).forEach(s => {
    const div = document.createElement('div'); div.className = 'sentence';
    const num = document.createElement('div'); num.className = 's-num'; num.textContent = s.id;
    const body = document.createElement('div'); body.className = 's-body';
    const orig = document.createElement('div'); orig.className = 's-text';
    (s.tokens || []).forEach((tok, i) => {
      const sp = document.createElement('span'); sp.className = 'token'; sp.textContent = tok.text;
      sp.addEventListener('click', e => { e.stopPropagation(); showPopup(tok, sp); });
      orig.appendChild(sp);
      if (space && i < s.tokens.length - 1) orig.appendChild(document.createTextNode(' '));
    });
    const tr = document.createElement('div'); tr.className = 's-trans'; tr.textContent = s.translation || '';
    body.appendChild(orig); body.appendChild(tr);
    div.appendChild(num); div.appendChild(body);
    list.appendChild(div);
  });
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Popup ─────────────────────────────────────────────
const popup = document.getElementById('popup');
let active = null;
function showPopup(tok, el) {
  if (active) active.classList.remove('active');
  active = el; el.classList.add('active');
  document.getElementById('pw').textContent = tok.text || '';
  document.getElementById('pr').textContent = tok.pinyin || tok.reading || '';
  document.getElementById('pm').textContent = tok.meaning || '';
  document.getElementById('pg').textContent = tok.grammar || '';
  popup.style.display = 'block';
  const r = el.getBoundingClientRect();
  let x = r.left, y = r.bottom + 8;
  if (x + 330 > window.innerWidth) x = window.innerWidth - 334;
  if (y + 190 > window.innerHeight) y = r.top - 195;
  popup.style.left = Math.max(4, x) + 'px';
  popup.style.top = Math.max(4, y) + 'px';
}
function closePopup() { popup.style.display = 'none'; if (active) { active.classList.remove('active'); active = null; } }
document.addEventListener('click', e => { if (!popup.contains(e.target) && !e.target.classList.contains('token')) closePopup(); });

// ── Helpers ───────────────────────────────────────────
function setStatus(t) { document.getElementById('status').textContent = t; }
function prog(p) { const el = document.getElementById('prog'); el.classList.toggle('show', p > 0); document.getElementById('pfill').style.width = p + '%'; }
function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.classList.add('show'); }
function clearErr() { document.getElementById('err').classList.remove('show'); }
function clearResults() { document.getElementById('results').classList.remove('show'); document.getElementById('sent-list').innerHTML = ''; document.getElementById('ocr-box').classList.remove('show'); }
function toggleOcr() {
  const box = document.getElementById('ocr-box'), tog = document.getElementById('ocr-toggle');
  box.classList.toggle('show');
  tog.textContent = box.classList.contains('show') ? 'OCR 원문 ▾' : 'OCR 원문 ▸';
}
</script>
</body>
</html>
