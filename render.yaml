services:
  - type: web
    name: chinese-book-analyzer-api
    env: python
    region: singapore
    plan: free
    runtime: python3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
