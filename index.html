<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>중국어.분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a1a1a;color:#c8c8c8;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}

header{padding:22px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:14px;color:#c8c8c8;letter-spacing:.01em}
.logo b{font-weight:600;color:#fff}
.badge{font-size:10px;color:#4a7a4a;letter-spacing:.1em;text-transform:uppercase;border:1px solid #2a4a2a;padding:3px 8px}
hr.rule{border:none;border-top:1px solid #2e2e2e}
.meta{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#555;text-align:right;padding:10px 0 20px}

/* ── Upload ── */
.drop-zone{border:1px dashed #3a3a3a;padding:32px 20px;text-align:center;transition:border-color .15s}
.drop-zone.over{border-color:#666;background:#1d1d1d}
.drop-hint{font-size:13px;color:#888;letter-spacing:.04em;line-height:2.2;margin-bottom:18px}
.drop-hint small{font-size:11px;color:#555;letter-spacing:.08em}
.upload-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-file{background:transparent;border:1px solid #555;color:#bbb;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 22px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-file:hover{border-color:#888;color:#eee}
.btn-camera{background:transparent;border:1px solid #3a5a3a;color:#7aaa7a;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 22px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-camera:hover{border-color:#5a8a5a;color:#aadaaa}
input[type=file]{display:none}

/* ── Preview ── */
.preview{display:none;gap:24px;margin:24px 0;align-items:flex-start}
.preview.show{display:flex}
@media(max-width:500px){.preview.show{flex-direction:column}}
.preview img{width:160px;height:220px;object-fit:cover;border:1px solid #333;flex-shrink:0}
@media(max-width:500px){.preview img{width:100%;height:auto;max-height:220px;object-fit:contain}}
.preview-info{flex:1;padding-top:4px;display:flex;flex-direction:column;gap:12px}
.file-name{font-size:12px;color:#777;letter-spacing:.04em;word-break:break-all}

/* ── Buttons ── */
.btn{background:transparent;border:1px solid #3a3a3a;color:#888;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:10px 24px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){border-color:#666;color:#ccc}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-go{border-color:#444;color:#aaa}
.btn-go:hover:not(:disabled){border-color:#888;color:#eee}

/* ── Status ── */
.status{font-size:11px;color:#888;letter-spacing:.06em}
.progress{height:1px;background:#2a2a2a;overflow:hidden;display:none}
.progress.show{display:block}
.progress-fill{height:100%;background:#666;width:0%;transition:width .4s}
.error-msg{font-size:12px;color:#c06060;letter-spacing:.04em;padding:12px;border:1px solid #5a2a2a;display:none;line-height:1.6}
.error-msg.show{display:block}

/* ── Results ── */
#results{display:none;margin-top:8px}
#results.show{display:block}
.ocr-toggle{font-size:10px;letter-spacing:.12em;color:#666;cursor:pointer;text-transform:uppercase;padding:14px 0;display:inline-block}
.ocr-toggle:hover{color:#999}
.ocr-box{background:#171717;border:1px solid #2a2a2a;padding:14px;font-size:12px;color:#777;line-height:1.9;white-space:pre-wrap;word-break:break-all;display:none;margin-bottom:8px}
.ocr-box.show{display:block}
.lang-badge{font-size:10px;letter-spacing:.12em;color:#666;text-transform:uppercase;padding:12px 0 4px;display:block}

/* ── Sentences ── */
.sentence{display:flex;gap:16px;padding:24px 0;border-bottom:1px solid #222}
.sentence:last-child{border-bottom:none}
.s-num{font-size:10px;letter-spacing:.14em;color:#555;min-width:18px;padding-top:6px;text-align:right;flex-shrink:0}
.s-body{flex:1;min-width:0}
.s-text{font-size:18px;line-height:2.6;color:#d8d8d8;margin-bottom:8px;word-break:break-all}
.s-trans{font-size:13px;color:#888;line-height:1.7}
.token{cursor:pointer;border-bottom:1px solid transparent;transition:color .1s,border-color .1s;padding:0 1px}
.token:hover{color:#fff;border-bottom-color:#777}
.token.active{color:#fff;border-bottom-color:#aaa}
.s-speak{background:none;border:none;cursor:pointer;font-size:13px;padding:0 0 0 8px;opacity:.25;transition:opacity .15s;vertical-align:middle;line-height:1}
.s-speak:hover{opacity:.7}

/* ── Popup ── */
#popup{position:fixed;background:#202020;border:1px solid #333;padding:18px 20px;min-width:240px;max-width:300px;z-index:9999;display:none;box-shadow:0 16px 48px rgba(0,0,0,.9)}
@media(max-width:500px){
  #popup{left:50%!important;transform:translateX(-50%);bottom:20px!important;top:auto!important;min-width:280px;max-width:calc(100vw - 32px)}
}
.pop-close{position:absolute;top:10px;right:12px;cursor:pointer;color:#555;font-size:13px}
.pop-close:hover{color:#aaa}
.pop-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pop-word{font-size:26px;font-weight:300;color:#fff;letter-spacing:.04em}
.pop-speak{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;opacity:.45;transition:opacity .15s;line-height:1}
.pop-speak:hover{opacity:1}
.pop-read{font-size:12px;color:#888;letter-spacing:.1em;margin-bottom:12px;font-style:italic}
.pop-mean{font-size:14px;color:#c0c0c0;line-height:1.7;margin-bottom:8px}
.pop-gram{font-size:10px;color:#666;letter-spacing:.12em;text-transform:uppercase}

footer{padding:14px 0;margin-top:50px;display:flex;justify-content:space-between;font-size:10px;color:#444;letter-spacing:.06em;border-top:1px solid #222}
</style>
</head>
<body>

<div id="popup">
  <span class="pop-close" onclick="closePopup()">✕</span>
  <div class="pop-header">
    <div class="pop-word" id="pw"></div>
    <button class="pop-speak" onclick="speakCurrent()" title="발음 듣기">🔊</button>
  </div>
  <div class="pop-read" id="pr"></div>
  <div class="pop-mean" id="pm"></div>
  <div class="pop-gram" id="pg"></div>
</div>

<div class="wrap">
  <header>
    <div class="logo">중국어<b>.분석기</b></div>
    <span class="badge">AI 분석</span>
  </header>
  <hr class="rule">
  <div class="meta">페이지 분석 ▶</div>

  <div class="drop-zone" id="drop">
    <div class="drop-hint">
      이미지를 드래그하거나<br>
      <small>JPG · PNG · WEBP · HEIC</small>
    </div>
    <div class="upload-btns">
      <button class="btn-file" onclick="document.getElementById('fi').click()">파일 선택</button>
      <button class="btn-camera" onclick="document.getElementById('cam').click()">📷 카메라</button>
    </div>
  </div>
  <input type="file" id="fi" accept="image/*,.heic,.heif">
  <input type="file" id="cam" accept="image/*" capture="environment">

  <div class="preview" id="preview">
    <img id="prev-img" src="" alt="">
    <div class="preview-info">
      <div class="file-name" id="prev-name"></div>
      <button class="btn btn-go" id="go-btn" onclick="runAnalysis()">분 석</button>
      <div class="status" id="status"></div>
      <div class="progress" id="prog"><div class="progress-fill" id="pfill"></div></div>
      <div class="error-msg" id="err"></div>
    </div>
  </div>

  <div id="results">
    <hr class="rule">
    <span class="lang-badge" id="lang-badge"></span>
    <span class="ocr-toggle" id="ocr-toggle" onclick="toggleOcr()">OCR 원문 ▸</span>
    <div class="ocr-box" id="ocr-box"></div>
    <div id="sent-list"></div>
  </div>

  <footer>
    <span>중국어.분석기</span>
    <span>powered by Gemini</span>
  </footer>
</div>

<script>
// ── 백엔드 URL (TTS 전용) ─────────────────────────────────
const API = 'https://chinese-book-analyzer.onrender.com';

// ── Gemini API 키 (브라우저 직접 호출) ────────────────────
function getGeminiKey() {
  let key = localStorage.getItem('gemini_key');
  if (!key) {
    key = prompt('Gemini API 키를 입력하세요\n(aistudio.google.com/apikey 에서 발급)');
    if (key) localStorage.setItem('gemini_key', key.trim());
  }
  return key ? key.trim() : null;
}

// ── State ─────────────────────────────────────────────────
let imgB64 = null, detectedLang = 'zh', currentWord = '';

// ── TTS ───────────────────────────────────────────────────
let currentAudio = null;
async function speak(text, lang) {
  if (!text) return;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  try {
    const url = `${API}/tts?text=${encodeURIComponent(text)}&lang=${lang || detectedLang}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    currentAudio = audio;
    audio.play();
    audio.onended = () => { URL.revokeObjectURL(audio.src); currentAudio = null; };
  } catch {
    // 폴백: 브라우저 TTS
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = {zh:'zh-CN',ja:'ja-JP',ko:'ko-KR',en:'en-US'}[lang||detectedLang]||'zh-CN';
      u.rate = 0.85;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
  }
}
function speakCurrent() { speak(currentWord, detectedLang); }

// ── Upload ────────────────────────────────────────────────
const drop = document.getElementById('drop');
['fi','cam'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {
    if (this.files?.[0]) readFile(this.files[0]);
  });
});
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});

function readFile(file) {
  clearErr(); clearResults(); setStatus('읽는 중...');
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1600;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      imgB64 = c.toDataURL('image/jpeg', 0.88).split(',')[1];
      document.getElementById('prev-img').src = 'data:image/jpeg;base64,' + imgB64;
      document.getElementById('prev-name').textContent = file.name;
      document.getElementById('preview').classList.add('show');
      setStatus('');
    };
    img.onerror = () => { showErr('이미지 로드 실패'); setStatus(''); };
    img.src = e.target.result;
  };
  reader.onerror = () => { showErr('파일 읽기 실패'); setStatus(''); };
  reader.readAsDataURL(file);
}

// ── Analyze ───────────────────────────────────────────────
const ANALYSIS_PROMPT = `이 이미지는 책 페이지입니다.
텍스트를 OCR로 추출하고 분석하여 반드시 아래 JSON 형식으로만 응답하세요.
마크다운, 설명 없이 순수 JSON만 출력하세요.

{"language":"zh|ja|ko|en","ocr":"원문 전체","sentences":[{"id":1,"original":"원문 문장","translation":"한국어 번역","tokens":[{"text":"단어","pinyin":"병음(중국어)","reading":"읽기(일본어)","meaning":"한국어 뜻","grammar":"품사"}]}]}

tokens는 의미 단위(단어·숙어·문법요소)로 분리. 문장부호 제외.`;

async function runAnalysis() {
  if (!imgB64) { showErr('이미지를 먼저 올려주세요.'); return; }
  const key = getGeminiKey();
  if (!key) { showErr('API 키가 필요합니다.'); return; }
  clearErr(); clearResults();
  document.getElementById('go-btn').disabled = true;
  setStatus('분석 중...');
  prog(20);

  let p = 20;
  const tick = setInterval(() => { p = Math.min(p + 3, 88); prog(p); }, 2000);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: 'image/jpeg', data: imgB64 } },
              { text: ANALYSIS_PROMPT }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 4096 }
        })
      }
    );
    clearInterval(tick);
    const raw = await res.json();
    if (!res.ok) {
      const msg = raw?.error?.message || `오류 ${res.status}`;
      if (res.status === 429) {
        // 키 초기화 안 함 — 일시적 한도 초과일 수 있음
        throw new Error('할당량 초과: ' + msg);
      }
      if (res.status === 400 || res.status === 403) {
        localStorage.removeItem('gemini_key');
        throw new Error('API 키 오류 (키 초기화됨): ' + msg);
      }
      throw new Error(msg);
    }
    const text = raw?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON 파싱 실패');
    const data = JSON.parse(m[0]);
    prog(100); setTimeout(() => prog(0), 500);
    setStatus('');
    render(data);
  } catch(e) {
    clearInterval(tick);
    showErr(e.message); prog(0); setStatus('');
  }
  document.getElementById('go-btn').disabled = false;
}

// ── Render ────────────────────────────────────────────────
const LANG_NAME = { zh:'🇨🇳 중국어', ja:'🇯🇵 일본어', ko:'🇰🇷 한국어', en:'🇺🇸 영어' };

function render(data) {
  const lang = data.language || 'zh';
  detectedLang = lang;
  const space = ['ko','en'].includes(lang);
  document.getElementById('lang-badge').textContent = (LANG_NAME[lang]||lang) + ' · Gemini';
  if (data.ocr) {
    document.getElementById('ocr-box').textContent = data.ocr;
    document.getElementById('ocr-toggle').style.display = 'inline-block';
  }
  const list = document.getElementById('sent-list');
  list.innerHTML = '';
  (data.sentences||[]).forEach(s => {
    const div  = document.createElement('div'); div.className = 'sentence';
    const num  = document.createElement('div'); num.className = 's-num'; num.textContent = s.id;
    const body = document.createElement('div'); body.className = 's-body';
    const orig = document.createElement('div'); orig.className = 's-text';

    (s.tokens||[]).forEach((tok, i) => {
      const sp = document.createElement('span'); sp.className = 'token'; sp.textContent = tok.text;
      sp.addEventListener('click', e => { e.stopPropagation(); showPopup(tok, sp); });
      orig.appendChild(sp);
      if (space && i < s.tokens.length-1) orig.appendChild(document.createTextNode(' '));
    });
    const spk = document.createElement('button');
    spk.className='s-speak'; spk.textContent='🔊'; spk.title='문장 발음';
    spk.addEventListener('click', e => { e.stopPropagation(); speak(s.original||'', lang); });
    orig.appendChild(spk);

    const tr = document.createElement('div'); tr.className = 's-trans'; tr.textContent = s.translation||'';
    body.appendChild(orig); body.appendChild(tr);
    div.appendChild(num); div.appendChild(body);
    list.appendChild(div);
  });
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── Popup ─────────────────────────────────────────────────
const popup = document.getElementById('popup');
let active = null;

function showPopup(tok, el) {
  if (active) active.classList.remove('active');
  active = el; el.classList.add('active');
  currentWord = tok.text || '';
  document.getElementById('pw').textContent = tok.text || '';
  document.getElementById('pr').textContent = tok.pinyin || tok.reading || '';
  document.getElementById('pm').textContent = tok.meaning || '';
  document.getElementById('pg').textContent = tok.grammar || '';
  popup.style.display = 'block';
  if (window.innerWidth > 500) {
    const r = el.getBoundingClientRect();
    let x = r.left, y = r.bottom + 8;
    if (x + 320 > window.innerWidth) x = window.innerWidth - 324;
    if (y + 180 > window.innerHeight) y = r.top - 185;
    popup.style.left = Math.max(4,x)+'px';
    popup.style.top  = Math.max(4,y)+'px';
    popup.style.transform = '';
  }
}
function closePopup() {
  popup.style.display='none';
  if (active) { active.classList.remove('active'); active=null; }
}
document.addEventListener('click', e => {
  if (!popup.contains(e.target) && !e.target.classList.contains('token')) closePopup();
});

// ── Helpers ───────────────────────────────────────────────
function setStatus(t) { document.getElementById('status').textContent=t; }
function prog(p) { document.getElementById('prog').classList.toggle('show',p>0); document.getElementById('pfill').style.width=p+'%'; }
function showErr(m) { const e=document.getElementById('err'); e.textContent=m; e.classList.add('show'); }
function clearErr() { document.getElementById('err').classList.remove('show'); }
function clearResults() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('sent-list').innerHTML='';
  document.getElementById('ocr-box').classList.remove('show');
}
function toggleOcr() {
  const b=document.getElementById('ocr-box'), t=document.getElementById('ocr-toggle');
  b.classList.toggle('show');
  t.textContent=b.classList.contains('show')?'OCR 원문 ▾':'OCR 원문 ▸';
}
</script>
</body>
</html>
