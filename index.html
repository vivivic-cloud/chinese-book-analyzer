<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>중국어.분석기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a1a1a;color:#c8c8c8;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 40px}

header{padding:28px 0;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:14px;color:#c8c8c8;letter-spacing:.01em}
.logo b{font-weight:600;color:#fff}
.btn-setting{background:none;border:none;color:#666;cursor:pointer;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-family:inherit;padding:4px 0}
.btn-setting:hover{color:#aaa}
hr.rule{border:none;border-top:1px solid #2e2e2e}
.meta{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#555;text-align:right;padding:12px 0 24px}

.drop-zone{border:1px dashed #3a3a3a;padding:56px 40px;text-align:center;cursor:pointer;transition:border-color .15s}
.drop-zone:hover,.drop-zone.over{border-color:#666;background:#1d1d1d}
.drop-hint{font-size:13px;color:#888;letter-spacing:.04em;line-height:2.2}
.drop-hint small{font-size:11px;color:#555;letter-spacing:.08em}
input[type=file]{display:none}

.preview{display:none;gap:32px;margin:28px 0;align-items:flex-start}
.preview.show{display:flex}
.preview img{width:180px;height:240px;object-fit:cover;border:1px solid #333;flex-shrink:0}
.preview-info{flex:1;padding-top:4px;display:flex;flex-direction:column;gap:14px}
.file-name{font-size:12px;color:#777;letter-spacing:.04em;word-break:break-all}

.btn{background:transparent;border:1px solid #3a3a3a;color:#888;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:10px 24px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){border-color:#666;color:#ccc}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-go{border-color:#444;color:#aaa}
.btn-go:hover:not(:disabled){border-color:#888;color:#eee}

.status{font-size:11px;color:#888;letter-spacing:.06em}
.progress{height:1px;background:#2a2a2a;overflow:hidden;display:none}
.progress.show{display:block}
.progress-fill{height:100%;background:#666;width:0%;transition:width .4s}
.error-msg{font-size:12px;color:#c06060;letter-spacing:.04em;padding:12px;border:1px solid #5a2a2a;display:none;line-height:1.6}
.error-msg.show{display:block}

#results{display:none;margin-top:8px}
#results.show{display:block}
.ocr-toggle{font-size:10px;letter-spacing:.12em;color:#666;cursor:pointer;text-transform:uppercase;padding:16px 0;display:inline-block}
.ocr-toggle:hover{color:#999}
.ocr-box{background:#171717;border:1px solid #2a2a2a;padding:16px;font-size:12px;color:#777;line-height:1.9;white-space:pre-wrap;word-break:break-all;display:none;margin-bottom:8px}
.ocr-box.show{display:block}
.lang-badge{font-size:10px;letter-spacing:.12em;color:#666;text-transform:uppercase;padding:14px 0 4px;display:block}

.sentence{display:flex;gap:20px;padding:28px 0;border-bottom:1px solid #222}
.sentence:last-child{border-bottom:none}
.s-num{font-size:10px;letter-spacing:.14em;color:#555;min-width:22px;padding-top:6px;text-align:right;flex-shrink:0}
.s-body{flex:1;min-width:0}
.s-text{font-size:18px;line-height:2.4;color:#d8d8d8;margin-bottom:10px;word-break:break-all}
.s-trans{font-size:13px;color:#888;line-height:1.7}
.token{cursor:pointer;border-bottom:1px solid transparent;transition:color .1s,border-color .1s;padding:0 1px}
.token:hover{color:#fff;border-bottom-color:#777}
.token.active{color:#fff;border-bottom-color:#aaa}

#popup{position:fixed;background:#202020;border:1px solid #333;padding:20px 22px;min-width:252px;max-width:320px;z-index:9999;display:none;box-shadow:0 16px 48px rgba(0,0,0,.9)}
.pop-close{position:absolute;top:10px;right:13px;cursor:pointer;color:#555;font-size:13px}
.pop-close:hover{color:#aaa}
.pop-word{font-size:26px;font-weight:300;color:#fff;margin-bottom:4px;letter-spacing:.04em}
.pop-read{font-size:12px;color:#888;letter-spacing:.1em;margin-bottom:14px;font-style:italic}
.pop-mean{font-size:14px;color:#c0c0c0;line-height:1.7;margin-bottom:10px}
.pop-gram{font-size:10px;color:#666;letter-spacing:.12em;text-transform:uppercase}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;justify-content:center;align-items:center}
.overlay.show{display:flex}
.modal{background:#1e1e1e;border:1px solid #2a2a2a;padding:32px;width:440px;max-width:90vw}
.modal-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#666;margin-bottom:6px}
.modal-sub{font-size:12px;color:#888;margin-bottom:22px;line-height:1.6}
.modal label{font-size:10px;letter-spacing:.1em;color:#666;display:block;margin-bottom:8px;text-transform:uppercase}
.modal input{width:100%;background:#171717;border:1px solid #2a2a2a;color:#c0c0c0;padding:11px 14px;font-size:13px;font-family:monospace;outline:none}
.modal input:focus{border-color:#555}
.modal-note{font-size:11px;color:#555;margin-top:10px;line-height:1.8}
.modal-note a{color:#888;text-decoration:none}
.modal-note a:hover{color:#bbb}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:22px}

footer{padding:16px 0;margin-top:60px;display:flex;justify-content:space-between;font-size:10px;color:#444;letter-spacing:.06em;border-top:1px solid #222}
</style>
</head>
<body>

<!-- Settings -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Google AI Studio API 키</div>
    <div class="modal-sub">구글 계정만 있으면 무료로 발급됩니다. 카드 불필요.</div>
    <label>API Key</label>
    <input type="password" id="key-input" placeholder="AIza...">
    <p class="modal-note">
      1. <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> 접속<br>
      2. "API 키 만들기" 클릭<br>
      3. 키 복사 후 여기 붙여넣기<br>
      <span style="color:#444">이 브라우저에만 저장됩니다</span>
    </p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn btn-go" onclick="saveKey()">저장</button>
    </div>
  </div>
</div>

<!-- Popup -->
<div id="popup">
  <span class="pop-close" onclick="closePopup()">✕</span>
  <div class="pop-word" id="pw"></div>
  <div class="pop-read" id="pr"></div>
  <div class="pop-mean" id="pm"></div>
  <div class="pop-gram" id="pg"></div>
</div>

<div class="wrap">
  <header>
    <div class="logo">중국어<b>.분석기</b></div>
    <button class="btn-setting" onclick="openModal()">API KEY ⚙</button>
  </header>
  <hr class="rule">
  <div class="meta">페이지 분석 ▶</div>

  <label class="drop-zone" id="drop" for="fi">
    <div class="drop-hint">
      이미지를 드래그하거나 클릭해서 올려주세요<br>
      <small>HEIC · JPG · PNG · WEBP</small>
    </div>
  </label>
  <input type="file" id="fi" accept=".heic,.heif,.jpg,.jpeg,.png,.webp,image/*">

  <div class="preview" id="preview">
    <img id="prev-img" src="" alt="">
    <div class="preview-info">
      <div class="file-name" id="prev-name"></div>
      <button class="btn btn-go" id="go-btn" onclick="runAnalysis()">분 석</button>
      <div class="status" id="status"></div>
      <div class="progress" id="prog"><div class="progress-fill" id="pfill"></div></div>
      <div class="error-msg" id="err"></div>
    </div>
  </div>

  <div id="results">
    <hr class="rule">
    <span class="lang-badge" id="lang-badge"></span>
    <span class="ocr-toggle" id="ocr-toggle" onclick="toggleOcr()">OCR 원문 ▸</span>
    <div class="ocr-box" id="ocr-box"></div>
    <div id="sent-list"></div>
  </div>

  <footer>
    <span>중국어.분석기</span>
    <span>powered by Gemini</span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script>
const KEY_STORE = 'gemini_api_key';
const getKey = () => localStorage.getItem(KEY_STORE) || '';
const openModal = () => { document.getElementById('key-input').value = getKey(); document.getElementById('overlay').classList.add('show'); };
const closeModal = () => document.getElementById('overlay').classList.remove('show');
function saveKey() {
  const k = document.getElementById('key-input').value.trim();
  if (k) localStorage.setItem(KEY_STORE, k);
  closeModal();
}

let imgB64 = null;

// ── Upload ────────────────────────────────────────────
const drop = document.getElementById('drop');
const fi = document.getElementById('fi');

// label[for=fi] handles click natively — no JS needed
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', e => { if (!drop.contains(e.relatedTarget)) drop.classList.remove('over'); });
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => {
  if (fi.files[0]) { processFile(fi.files[0]); fi.value = ''; }
});

async function processFile(file) {
  setStatus('처리 중...'); prog(20); clearErr(); clearResults();
  try {
    let blob = file;
    const name = file.name.toLowerCase();
    if (name.endsWith('.heic') || name.endsWith('.heif')) {
      setStatus('HEIC 변환 중...');
      blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
      if (Array.isArray(blob)) blob = blob[0];
    }
    prog(60);
    imgB64 = await compress(blob);
    document.getElementById('prev-img').src = 'data:image/jpeg;base64,' + imgB64;
    document.getElementById('prev-name').textContent = file.name;
    document.getElementById('preview').classList.add('show');
    prog(0); setStatus('');
  } catch(e) { showErr('파일 처리 실패: ' + e.message); prog(0); setStatus(''); }
}

function compress(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const MAX = 1400;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = () => rej(new Error('이미지 로드 실패'));
    img.src = url;
  });
}

// ── Analyze (Gemini) ──────────────────────────────────
async function runAnalysis() {
  const key = getKey();
  if (!key) { openModal(); return; }
  if (!imgB64) { showErr('이미지를 먼저 올려주세요.'); return; }

  clearErr(); clearResults();
  document.getElementById('go-btn').disabled = true;
  setStatus('분석 중...');
  prog(20);

  let p = 20;
  const tick = setInterval(() => { p = Math.min(p + 3, 85); prog(p); }, 2000);

  const prompt = `이미지의 텍스트를 분석하여 반드시 아래 JSON 형식으로만 응답하세요.
마크다운 코드블록 없이 순수 JSON만 출력하세요.

{
  "language": "zh|ja|ko|en",
  "ocr": "이미지에서 추출한 전체 원문",
  "sentences": [
    {
      "id": 1,
      "original": "원문 문장",
      "translation": "한국어 번역",
      "tokens": [
        {"text":"단어","pinyin":"병음(중국어)","reading":"읽기(일본어)","meaning":"한국어 뜻","grammar":"품사/문법"}
      ]
    }
  ]
}

tokens는 의미 단위(단어·숙어·문법요소)로 분리. 문장부호는 제외.`;

  try {
    const r = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: 'image/jpeg', data: imgB64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
        })
      }
    );

    clearInterval(tick);
    const data = await r.json();
    if (!r.ok) {
      const msg = data.error?.message || `오류 ${r.status}`;
      throw new Error(msg);
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const m = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON 파싱 실패: ' + raw.slice(0, 100));

    prog(100); setTimeout(() => prog(0), 600);
    setStatus('');
    render(JSON.parse(m[0]));
  } catch(e) {
    clearInterval(tick);
    showErr(e.message); prog(0); setStatus('');
  }
  document.getElementById('go-btn').disabled = false;
}

// ── Render ────────────────────────────────────────────
const LANG_NAME = { zh:'🇨🇳 중국어', ja:'🇯🇵 일본어', ko:'🇰🇷 한국어', en:'🇺🇸 영어' };

function render(data) {
  const lang = data.language || 'zh';
  const space = ['ko','en'].includes(lang);
  document.getElementById('lang-badge').textContent = (LANG_NAME[lang] || lang) + ' · Gemini';
  if (data.ocr) {
    document.getElementById('ocr-box').textContent = data.ocr;
    document.getElementById('ocr-toggle').style.display = 'inline-block';
  }
  const list = document.getElementById('sent-list');
  list.innerHTML = '';
  (data.sentences || []).forEach(s => {
    const div = document.createElement('div'); div.className = 'sentence';
    const num = document.createElement('div'); num.className = 's-num'; num.textContent = s.id;
    const body = document.createElement('div'); body.className = 's-body';
    const orig = document.createElement('div'); orig.className = 's-text';
    (s.tokens || []).forEach((tok, i) => {
      const sp = document.createElement('span'); sp.className = 'token'; sp.textContent = tok.text;
      sp.addEventListener('click', e => { e.stopPropagation(); showPopup(tok, sp); });
      orig.appendChild(sp);
      if (space && i < s.tokens.length - 1) orig.appendChild(document.createTextNode(' '));
    });
    const tr = document.createElement('div'); tr.className = 's-trans'; tr.textContent = s.translation || '';
    body.appendChild(orig); body.appendChild(tr);
    div.appendChild(num); div.appendChild(body);
    list.appendChild(div);
  });
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Popup ─────────────────────────────────────────────
const popup = document.getElementById('popup');
let active = null;
function showPopup(tok, el) {
  if (active) active.classList.remove('active');
  active = el; el.classList.add('active');
  document.getElementById('pw').textContent = tok.text || '';
  document.getElementById('pr').textContent = tok.pinyin || tok.reading || '';
  document.getElementById('pm').textContent = tok.meaning || '';
  document.getElementById('pg').textContent = tok.grammar || '';
  popup.style.display = 'block';
  const rect = el.getBoundingClientRect();
  let x = rect.left, y = rect.bottom + 8;
  if (x + 330 > window.innerWidth) x = window.innerWidth - 334;
  if (y + 200 > window.innerHeight) y = rect.top - 205;
  popup.style.left = Math.max(4, x) + 'px';
  popup.style.top = Math.max(4, y) + 'px';
}
function closePopup() {
  popup.style.display = 'none';
  if (active) { active.classList.remove('active'); active = null; }
}
document.addEventListener('click', e => {
  if (!popup.contains(e.target) && !e.target.classList.contains('token')) closePopup();
});

// ── Helpers ───────────────────────────────────────────
function setStatus(t) { document.getElementById('status').textContent = t; }
function prog(p) { document.getElementById('prog').classList.toggle('show', p > 0); document.getElementById('pfill').style.width = p + '%'; }
function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.classList.add('show'); }
function clearErr() { document.getElementById('err').classList.remove('show'); }
function clearResults() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('sent-list').innerHTML = '';
  document.getElementById('ocr-box').classList.remove('show');
}
function toggleOcr() {
  const box = document.getElementById('ocr-box'), tog = document.getElementById('ocr-toggle');
  box.classList.toggle('show');
  tog.textContent = box.classList.contains('show') ? 'OCR 원문 ▾' : 'OCR 원문 ▸';
}

if (!getKey()) openModal();
</script>
</body>
</html>
